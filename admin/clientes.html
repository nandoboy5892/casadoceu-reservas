<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Casa do Céu</title>
  <link rel="icon" href="https://i.imgur.com/Tgntdk2.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary: #0077cc;
      --primary-dark: #005fa3;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --white: #ffffff;
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
      --transition: all 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--light);
      color: var(--dark);
    }

    nav {
      background: var(--white);
      box-shadow: var(--shadow);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--primary);
      text-decoration: none;
    }

    .nav-logo img { height: 30px; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 50px;
      border: none;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
    }

    .btn-primary { background: var(--primary); color: var(--white); }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover { background: var(--primary); color: var(--white); }

    .btn-success { background: #25d366; color: var(--white); }
    .btn-success:hover { background: #1da851; transform: translateY(-2px); }

    .btn-danger { background: #dc3545; color: var(--white); }
    .btn-danger:hover { background: #b02a37; transform: translateY(-2px); }

    .btn-sm { padding: 5px 12px; font-size: 0.78rem; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .page-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--primary);
      position: relative;
      display: inline-block;
    }

    .page-title::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 60px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
    }

    .page-subtitle {
      color: var(--gray);
      margin-top: 12px;
      font-size: 0.9rem;
    }

    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 28px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .card h2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-full { grid-column: 1 / -1; }

    .form-group { display: flex; flex-direction: column; gap: 5px; }

    label {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--dark);
    }

    input, textarea, select {
      padding: 10px 12px;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.9rem;
      background: var(--light);
      color: var(--dark);
      transition: var(--transition);
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(0,119,204,0.12);
    }

    textarea { resize: vertical; min-height: 80px; }

    .form-actions { margin-top: 20px; }

    #mensagem {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }

    #mensagem.sucesso { background: #d1e7dd; color: #0a3622; display: block; }
    #mensagem.erro    { background: #f8d7da; color: #58151c; display: block; }

    /* Toolbar */
    .list-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .contador {
      font-size: 0.85rem;
      color: var(--gray);
      font-weight: 600;
    }

    .search-box {
      position: relative;
      width: 260px;
    }

    .search-box input {
      width: 100%;
      padding-left: 34px;
    }

    .search-box i {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 0.85rem;
    }

    select {
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* Tabela */
    .table-wrapper { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    th {
      background: var(--primary);
      color: var(--white);
      padding: 12px 14px;
      text-align: left;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:first-child { border-radius: 8px 0 0 0; }
    th:last-child  { border-radius: 0 8px 0 0; }

    th i.sort-icon { margin-left: 4px; font-size: 0.75rem; opacity: 0.7; }

    td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:hover td { background: #f0f6fc; }

    .acoes { display: flex; gap: 6px; flex-wrap: wrap; }

    .obs-texto {
      font-size: 0.8rem;
      color: var(--gray);
      margin-top: 4px;
      font-style: italic;
    }

    /* Paginação */
    .paginacao {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .paginacao button {
      padding: 6px 14px;
      border-radius: 50px;
      border: 2px solid var(--primary);
      background: transparent;
      color: var(--primary);
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .paginacao button:hover,
    .paginacao button.ativo {
      background: var(--primary);
      color: var(--white);
    }

    .paginacao button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .paginacao-info {
      font-size: 0.82rem;
      color: var(--gray);
    }

    .user-badge {
      background: rgba(0,119,204,0.08);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-overlay.ativo { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 12px;
      padding: 32px 28px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: fadeInUp 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-botoes {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 700px) {
      .form-grid { grid-template-columns: 1fr; }
      nav { padding: 1rem; }
      .container { padding: 24px 16px; }
      .search-box { width: 100%; }
      .list-toolbar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/admin/dashboard.html" class="nav-logo">
    <img src="https://i.imgur.com/Tgntdk2.png" alt="Logo Casa do Céu">
    <span>Casa do Céu</span>
  </a>
  <div class="nav-right">
    <span class="user-badge"><i class="fas fa-user"></i> <span id="usuarioLogado"></span></span>
    <a href="/admin/dashboard.html" class="btn btn-outline">
      <i class="fas fa-arrow-left"></i> Dashboard
    </a>
    <button class="btn btn-outline" id="btnSair">
      <i class="fas fa-sign-out-alt"></i> Sair
    </button>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <div>
      <h1 class="page-title">Clientes</h1>
      <p class="page-subtitle">Cadastre e gerencie os clientes da Casa do Céu</p>
    </div>
  </div>

  <div id="mensagem"></div>

  <!-- Formulário novo cliente -->
  <div class="card">
    <h2><i class="fas fa-user-plus"></i> Novo Cliente</h2>
    <form id="formCliente">
      <div class="form-grid">
        <div class="form-group">
          <label>Nome completo *</label>
          <input type="text" id="nome" required placeholder="Nome do cliente">
        </div>
        <div class="form-group">
          <label>Telefone *</label>
          <input type="tel" id="telefone" required placeholder="(31) 99999-9999">
        </div>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="emailCliente" placeholder="email@exemplo.com">
        </div>
        <div class="form-group">
          <label>CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00">
        </div>
        <div class="form-group form-full">
          <label>Observações</label>
          <textarea id="observacoes" placeholder="Alergias, preferências, informações importantes..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i> Salvar Cliente
        </button>
      </div>
    </form>
  </div>

  <!-- Lista de clientes -->
  <div class="card">
    <h2><i class="fas fa-users"></i> Clientes Cadastrados</h2>

    <div class="list-toolbar">
      <div class="toolbar-left">
        <span class="contador" id="contadorClientes">0 clientes</span>
        <select id="ordenacao">
          <option value="criadoEm_desc">Mais recentes</option>
          <option value="criadoEm_asc">Mais antigos</option>
          <option value="nome_asc">Nome A → Z</option>
          <option value="nome_desc">Nome Z → A</option>
        </select>
      </div>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="busca" placeholder="Buscar por nome, telefone ou e-mail">
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>E-mail</th>
            <th>CPF</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="listaClientes">
          <tr><td colspan="5" style="color:var(--gray);text-align:center;padding:24px;">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="paginacao" id="paginacao"></div>
  </div>

</div>

<!-- Modal de edição -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2><i class="fas fa-user-edit"></i> Editar Cliente</h2>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Nome completo *</label>
        <input type="text" id="editNome" placeholder="Nome do cliente">
      </div>
      <div class="form-group">
        <label>Telefone *</label>
        <input type="tel" id="editTelefone" placeholder="(31) 99999-9999">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="editEmail" placeholder="email@exemplo.com">
      </div>
      <div class="form-group">
        <label>CPF</label>
        <input type="text" id="editCpf" placeholder="000.000.000-00">
      </div>
      <div class="form-group form-full">
        <label>Observações</label>
        <textarea id="editObservacoes" placeholder="Alergias, preferências, informações importantes..."></textarea>
      </div>
    </div>
    <div class="modal-botoes">
      <button class="btn btn-outline" id="btnCancelarEdicao">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvarEdicao">
        <i class="fas fa-save"></i> Salvar alterações
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db } from "../assets/js/firebase.js";
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import {
    collection, addDoc, onSnapshot, orderBy, query,
    doc, updateDoc, deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const mensagemEl    = document.getElementById('mensagem');
  const listaEl       = document.getElementById('listaClientes');
  const formEl        = document.getElementById('formCliente');
  const buscaEl       = document.getElementById('busca');
  const contadorEl    = document.getElementById('contadorClientes');
  const ordenacaoEl   = document.getElementById('ordenacao');
  const paginacaoEl   = document.getElementById('paginacao');
  const modalOverlay  = document.getElementById('modalOverlay');

  let todosClientes       = [];
  let clienteEditandoId   = null;

  const POR_PAGINA = 10;
  let paginaAtual  = 1;

  // Protege página
  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "/admin/login.html"; return; }
    document.getElementById('usuarioLogado').textContent = user.email;
    carregarClientes();
  });

  document.getElementById('btnSair').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = "/admin/login.html";
  });

  function mostrarMensagem(texto, tipo = 'sucesso') {
    mensagemEl.textContent = texto;
    mensagemEl.className = tipo;
    setTimeout(() => { mensagemEl.className = ''; mensagemEl.textContent = ''; }, 3500);
  }

  // Salvar novo cliente
  formEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await addDoc(collection(db, 'clientes'), {
        nome:        document.getElementById('nome').value.trim(),
        telefone:    document.getElementById('telefone').value.trim(),
        email:       document.getElementById('emailCliente').value.trim(),
        cpf:         document.getElementById('cpf').value.trim(),
        observacoes: document.getElementById('observacoes').value.trim(),
        criadoEm:    new Date()
      });
      mostrarMensagem('Cliente salvo com sucesso!');
      formEl.reset();
      paginaAtual = 1;
    } catch (error) {
      console.error(error);
      mostrarMensagem('Erro ao salvar cliente.', 'erro');
    }
  });

  // Carregar do Firestore
  function carregarClientes() {
    const q = query(collection(db, 'clientes'), orderBy('criadoEm', 'desc'));
    onSnapshot(q, (snapshot) => {
      todosClientes = [];
      snapshot.forEach((docSnap) => {
        todosClientes.push({ id: docSnap.id, ...docSnap.data() });
      });
      paginaAtual = 1;
      renderizar();
    });
  }

  // Filtro + ordenação + paginação
  buscaEl.addEventListener('input',    () => { paginaAtual = 1; renderizar(); });
  ordenacaoEl.addEventListener('change', () => { paginaAtual = 1; renderizar(); });

  function renderizar() {
    const termo  = buscaEl.value.trim().toLowerCase();
    const [campo, dir] = ordenacaoEl.value.split('_');

    // 1. Filtrar
    let lista = todosClientes.filter((c) => {
      if (!termo) return true;
      return (
        (c.nome      || '').toLowerCase().includes(termo) ||
        (c.telefone  || '').toLowerCase().includes(termo) ||
        (c.email     || '').toLowerCase().includes(termo)
      );
    });

    // 2. Ordenar
    lista.sort((a, b) => {
      let va = a[campo] || '';
      let vb = b[campo] || '';
      if (campo === 'criadoEm') {
        va = a.criadoEm?.toDate ? a.criadoEm.toDate() : new Date(a.criadoEm);
        vb = b.criadoEm?.toDate ? b.criadoEm.toDate() : new Date(b.criadoEm);
      }
      if (va < vb) return dir === 'asc' ? -1 : 1;
      if (va > vb) return dir === 'asc' ? 1 : -1;
      return 0;
    });

    // 3. Contador
    contadorEl.textContent = lista.length + (lista.length === 1 ? ' cliente' : ' clientes');

    // 4. Paginar
    const total  = lista.length;
    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const fim    = inicio + POR_PAGINA;
    const pagina = lista.slice(inicio, fim);

    // 5. Renderizar tabela
    if (!pagina.length) {
      listaEl.innerHTML = '<tr><td colspan="5" style="color:var(--gray);text-align:center;padding:24px;">Nenhum cliente encontrado.</td></tr>';
      paginacaoEl.innerHTML = '';
      return;
    }

    listaEl.innerHTML = '';
    pagina.forEach((c) => {
      const fone = (c.telefone || '').replace(/\D/g, '');
      const whatsLink = fone ? `https://wa.me/55${fone}` : null;

      listaEl.innerHTML += `
        <tr>
          <td>
            <strong>${c.nome || ''}</strong>
            ${c.observacoes ? `<div class="obs-texto"><i class="fas fa-sticky-note"></i> ${c.observacoes}</div>` : ''}
          </td>
          <td>${c.telefone || '<span style="color:var(--gray)">-</span>'}</td>
          <td>${c.email    || '<span style="color:var(--gray)">-</span>'}</td>
          <td>${c.cpf      || '<span style="color:var(--gray)">-</span>'}</td>
          <td>
            <div class="acoes">
              ${whatsLink ? `
                <a class="btn btn-success btn-sm" href="${whatsLink}" target="_blank" title="Abrir WhatsApp">
                  <i class="fab fa-whatsapp"></i>
                </a>` : ''}
              <button class="btn btn-primary btn-sm" onclick="abrirEdicao('${c.id}')">
                <i class="fas fa-edit"></i> Editar
              </button>
              <button class="btn btn-danger btn-sm" onclick="excluirCliente('${c.id}', '${(c.nome || '').replace(/'/g, "\\'")}')">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </td>
        </tr>`;
    });

    // 6. Renderizar paginação
    const totalPaginas = Math.ceil(total / POR_PAGINA);
    paginacaoEl.innerHTML = '';

    if (totalPaginas <= 1) return;

    const btnAnterior = document.createElement('button');
    btnAnterior.innerHTML = '<i class="fas fa-chevron-left"></i>';
    btnAnterior.disabled = paginaAtual === 1;
    btnAnterior.addEventListener('click', () => { paginaAtual--; renderizar(); });
    paginacaoEl.appendChild(btnAnterior);

    for (let i = 1; i <= totalPaginas; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      if (i === paginaAtual) btn.classList.add('ativo');
      btn.addEventListener('click', () => { paginaAtual = i; renderizar(); });
      paginacaoEl.appendChild(btn);
    }

    const btnProximo = document.createElement('button');
    btnProximo.innerHTML = '<i class="fas fa-chevron-right"></i>';
    btnProximo.disabled = paginaAtual === totalPaginas;
    btnProximo.addEventListener('click', () => { paginaAtual++; renderizar(); });
    paginacaoEl.appendChild(btnProximo);

    const info = document.createElement('span');
    info.className = 'paginacao-info';
    info.textContent = `Página ${paginaAtual} de ${totalPaginas}`;
    paginacaoEl.appendChild(info);
  }

  // Abrir modal de edição
  window.abrirEdicao = (id) => {
    const cliente = todosClientes.find(c => c.id === id);
    if (!cliente) return;
    clienteEditandoId = id;
    document.getElementById('editNome').value        = cliente.nome        || '';
    document.getElementById('editTelefone').value    = cliente.telefone    || '';
    document.getElementById('editEmail').value       = cliente.email       || '';
    document.getElementById('editCpf').value         = cliente.cpf         || '';
    document.getElementById('editObservacoes').value = cliente.observacoes || '';
    modalOverlay.classList.add('ativo');
  };

  document.getElementById('btnCancelarEdicao').addEventListener('click', () => {
    modalOverlay.classList.remove('ativo');
    clienteEditandoId = null;
  });

  document.getElementById('btnSalvarEdicao').addEventListener('click', async () => {
    if (!clienteEditandoId) return;
    try {
      await updateDoc(doc(db, 'clientes', clienteEditandoId), {
        nome:        document.getElementById('editNome').value.trim(),
        telefone:    document.getElementById('editTelefone').value.trim(),
        email:       document.getElementById('editEmail').value.trim(),
        cpf:         document.getElementById('editCpf').value.trim(),
        observacoes: document.getElementById('editObservacoes').value.trim(),
      });
      mostrarMensagem('Cliente atualizado com sucesso!');
      modalOverlay.classList.remove('ativo');
      clienteEditandoId = null;
    } catch (error) {
      console.error(error);
      mostrarMensagem('Erro ao atualizar cliente.', 'erro');
    }
  });

  window.excluirCliente = async (id, nome) => {
    if (!confirm(`Excluir o cliente "${nome}"?`)) return;
    try {
      await deleteDoc(doc(db, 'clientes', id));
      mostrarMensagem('Cliente excluído com sucesso!');
    } catch (error) {
      console.error(error);
      mostrarMensagem('Erro ao excluir cliente.', 'erro');
    }
  };
</script>

</body>
</html>
