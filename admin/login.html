<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Casa do Céu</title>
  <link rel="icon" href="https://i.imgur.com/Tgntdk2.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary: #0077cc;
      --primary-dark: #005fa3;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --white: #ffffff;
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
      --transition: all 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--light);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
      animation: fadeInUp 0.8s ease;
    }

    .logo img {
      width: 80px;
      margin-bottom: 10px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    .logo h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--primary);
    }

    .logo span {
      font-size: 0.85rem;
      color: var(--gray);
    }

    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 32px 28px;
      box-shadow: var(--shadow);
      animation: fadeInUp 0.9s ease;
    }

    .card h2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 4px;
      color: var(--dark);
    }

    .card p {
      font-size: 0.85rem;
      color: var(--gray);
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 5px;
      color: var(--dark);
    }

    .input-group {
      margin-bottom: 16px;
      position: relative;
    }

    .input-group i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.95rem;
      background: var(--light);
      color: var(--dark);
      transition: var(--transition);
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(0,119,204,0.12);
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      border-radius: 50px;
      border: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      background: var(--primary);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(0,119,204,0.3);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button[type="submit"]:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,119,204,0.35);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    #erro {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #dc3545;
      text-align: center;
      min-height: 18px;
    }

    .footer-info {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--gray);
      animation: fadeInUp 1s ease;
    }

    .footer-info a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-info a:hover {
      text-decoration: underline;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="logo">
    <img src="https://i.imgur.com/Tgntdk2.png" alt="Logo Casa do Céu">
    <h1>Casa do Céu</h1>
    <span>Painel Administrativo</span>
  </div>

  <div class="card">
    <h2>Bem-vindo de volta</h2>
    <p>Acesso restrito à administração</p>

    <form id="loginForm">
      <div class="input-group">
        <label>E-mail</label>
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" required placeholder="seu@email.com">
      </div>

      <div class="input-group">
        <label>Senha</label>
        <i class="fas fa-lock"></i>
        <input type="password" id="senha" required placeholder="••••••••">
      </div>

      <button type="submit">
        <i class="fas fa-sign-in-alt"></i> Entrar no painel
      </button>

      <p id="erro"></p>
    </form>
  </div>

  <div class="footer-info">
    <a href="https://www.casadoceu.com.br" target="_blank" rel="noopener">
      <i class="fas fa-arrow-left"></i> Voltar ao site
    </a>
  </div>
</div>

<script type="module">
  import { auth } from "../assets/js/firebase.js";
  import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const form   = document.getElementById('loginForm');
  const erroEl = document.getElementById('erro');

  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = "/admin/dashboard.html";
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    erroEl.textContent = '';
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    try {
      await signInWithEmailAndPassword(auth, email, senha);
      window.location.href = "/admin/dashboard.html";
    } catch {
      erroEl.textContent = 'E-mail ou senha inválidos.';
    }
  });
</script>

</body>
</html>
