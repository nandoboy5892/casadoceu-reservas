<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Casa do Céu</title>
</head>
<body>
  <h1>Login - Casa do Céu</h1>
  <form id="loginForm">
    <label>
      E-mail:
      <input type="email" id="email" required>
    </label>
    <br><br>
    <label>
      Senha:
      <input type="password" id="senha" required>
    </label>
    <br><br>
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
